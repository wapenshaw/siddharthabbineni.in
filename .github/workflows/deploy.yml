name: Deploy

on:
  push:
    branches:
      - master
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        type: choice
        options:
          - staging
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{
            (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod') ||
            (github.event_name == 'push' && github.ref == 'refs/heads/master')
              && secrets.AZURE_SWA_DEPLOY_TOKEN_PROD
              || secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_MANGO_FOREST_072AF5C03
            }}
          action: upload
          app_location: /
          output_location: .next
          skip_app_build: true
